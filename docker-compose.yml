services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: messaging_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - messaging_network

  nginx:
    image: nginx:alpine
    container_name: messaging_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - messaging_network

  mysql:
    image: mysql:8.0
    container_name: messaging_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: messaging_app
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: gismat
      MYSQL_PASSWORD: "0000"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - messaging_network

  redis:
    image: redis:alpine
    container_name: messaging_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - messaging_network

networks:
  messaging_network:
    driver: bridge

volumes:
  mysql_data: